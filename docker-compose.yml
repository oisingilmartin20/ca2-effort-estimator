services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tawos_vectors_postgres
    environment:
      POSTGRES_USER: tawos
      POSTGRES_PASSWORD: tawos
      POSTGRES_DB: tawos_vectors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tawos -d tawos_vectors"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
